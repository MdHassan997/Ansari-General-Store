{% extends 'base.html' %}
{% block title %}My Profile – {{ store_name }}{% endblock %}

{% block content %}
<div class="container page-container">
    <h1 class="page-title">👤 My Profile</h1>
    <div class="profile-layout">
        <div class="profile-sidebar">
            <div class="profile-avatar">{{ (user.name or 'U')[0]|upper }}</div>
            <h3>{{ user.name or 'User' }}</h3>
            <p>{{ user.email }}</p>
            <nav class="profile-nav">
                <a href="{{ url_for('auth.profile') }}" class="active"><i class="fas fa-user"></i> Profile</a>
                <a href="{{ url_for('order.my_orders') }}"><i class="fas fa-box"></i> My Orders</a>
                <a href="{{ url_for('cart.wishlist') }}"><i class="fas fa-heart"></i> Wishlist</a>
                <a href="{{ url_for('auth.logout') }}"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </div>
        <div class="profile-main">
            <div class="profile-form-card">
                <h2>Edit Profile</h2>
                <form method="POST">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" name="name" value="{{ user.name or '' }}" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" value="{{ user.email or '' }}" disabled>
                        <small>Email cannot be changed</small>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phone" value="{{ user.phone or '' }}" placeholder="+91 XXXXXXXXXX">
                    </div>
                    <div class="form-group">
                        <label>Default Delivery Address</label>
                        <textarea name="address" rows="3" placeholder="Your full address">{{ user.address or '' }}</textarea>
                    </div>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
