{% extends 'base.html' %}
{% block title %}Forgot Password – {{ store_name }}{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">🔑</div>
            <h1>Reset Password</h1>
            <p>Enter your email and we'll send a reset link</p>
        </div>
        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-icon-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" placeholder="you@example.com" required>
                </div>
            </div>
            <button type="submit" class="btn-auth"><i class="fas fa-paper-plane"></i> Send Reset Link</button>
        </form>
        <div class="auth-divider"><span>Remember it?</span></div>
        <a href="{{ url_for('auth.login') }}" class="btn-auth-outline"><i class="fas fa-sign-in-alt"></i> Back to Login</a>
    </div>
</div>
{% endblock %}
