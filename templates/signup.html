{% extends 'base.html' %}
{% block title %}Sign Up – {{ store_name }}{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">🛒</div>
            <h1>Create Account</h1>
            <p>Join {{ store_name }} for a great shopping experience</p>
        </div>

        <form method="POST" action="{{ url_for('auth.signup') }}">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-icon-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text" name="name" placeholder="Your full name" required
                           value="{{ request.form.get('name', '') }}">
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <div class="input-icon-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" placeholder="you@example.com" required
                           value="{{ request.form.get('email', '') }}">
                </div>
            </div>

            <div class="form-group">
                <label>Phone Number (optional)</label>
                <div class="input-icon-wrap">
                    <i class="fas fa-phone"></i>
                    <input type="tel" name="phone" placeholder="+91 XXXXXXXXXX"
                           value="{{ request.form.get('phone', '') }}">
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-icon-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="Min. 6 characters" required
                           id="password" minlength="6">
                    <button type="button" class="toggle-password" onclick="togglePassword('password', this)">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-icon-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="confirm_password" placeholder="Repeat password" required
                           id="confirmPassword" minlength="6">
                </div>
            </div>

            <button type="submit" class="btn-auth" onclick="return validatePasswords()">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>

        <div class="auth-divider"><span>Already have an account?</span></div>

        <a href="{{ url_for('auth.login') }}" class="btn-auth-outline">
            <i class="fas fa-sign-in-alt"></i> Sign In
        </a>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    btn.innerHTML = isPassword ? '<i class="far fa-eye-slash"></i>' : '<i class="far fa-eye"></i>';
}

function validatePasswords() {
    const p = document.getElementById('password').value;
    const cp = document.getElementById('confirmPassword').value;
    if (p !== cp) {
        showToast('Passwords do not match!', 'error');
        return false;
    }
    return true;
}
</script>
{% endblock %}
