{% extends 'base.html' %}
{% block title %}Login – {{ store_name }}{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">🛒</div>
            <h1>Welcome Back</h1>
            <p>Sign in to your {{ store_name }} account</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-icon-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" placeholder="you@example.com" required
                           value="{{ request.form.get('email', '') }}">
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-icon-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="Your password" required id="passwordInput">
                    <button type="button" class="toggle-password" onclick="togglePassword('passwordInput', this)">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <a href="{{ url_for('auth.forgot_password') }}" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn-auth">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <div class="auth-divider"><span>New to {{ store_name }}?</span></div>

        <a href="{{ url_for('auth.signup') }}" class="btn-auth-outline">
            <i class="fas fa-user-plus"></i> Create Account
        </a>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    btn.innerHTML = isPassword ? '<i class="far fa-eye-slash"></i>' : '<i class="far fa-eye"></i>';
}
</script>
{% endblock %}
